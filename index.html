<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель мониторинга времени</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">


</head>
<body>

    <div class="grid-container">

        <div class="grid-element user">

            <div class="user-card">
                <img src="images/image-jeremy.png" alt="image-jeremy">
                <p class="report-text">Report for<p>
                <span class="name">Jeremy Robson</span>
            </div>

            <div class="category">
                <span class="choice">Daily</span>
                <span class="choice">Weekly</span>
                <span class="choice">Monthly</span>
            </div>

        </div>

        <div class="grid-element box-work">
            <div class="card">
                <div class="name-box">
                    <p>Work</p>
                    <img src="images/icon-ellipsis.svg" alt="ellipsis">
                </div>
                <span class="hrs work-hrs">32hrs</span>
                <span class="previous previous-work">Last Week - 36hrs</span>
            </div>
        </div>

        <div class="grid-element box-play">
            <div class="card">
                <div class="name-box">
                    <p>Play</p>
                    <img src="images/icon-ellipsis.svg" alt="ellipsis">
                </div>
                <span class="hrs play-hrs">10hrs</span>
                <span class="previous previous-play">Last Week - 8hrs</span>
            </div>
        </div>

        <div class="grid-element box-study">
            <div class="card">
                <div class="name-box">
                    <p>Study</p>
                    <img src="images/icon-ellipsis.svg" alt="ellipsis">
                </div>
                <span class="hrs study-hrs">4hrs</span>
                <span class="previous previous-study">Last Week - 7hrs</span>
            </div>
        </div>

        <div class="grid-element box-exercise">
            <div class="card">
                <div class="name-box">
                    <p>Exercise</p>
                    <img src="images/icon-ellipsis.svg" alt="ellipsis">
                </div>
                <span class="hrs exercise-hrs">4hrs</span>
                <span class="previous previous-exercise">Last Week - 5hrs</span>
            </div>
        </div>

        <div class="grid-element box-social">
            <div class="card">
                <div class="name-box">
                    <p>Social</p>
                    <img src="images/icon-ellipsis.svg" alt="ellipsis">
                </div>
                <span class="hrs social-hrs">5hrs</span>
                <span class="previous previous-social">Last Week - 10hrs</span>
            </div>
        </div>

        <div class="grid-element box-selfcare">
            <div class="card">
                <div class="name-box">
                    <p>Self Care</p>
                    <img src="images/icon-ellipsis.svg" alt="ellipsis">
                </div>
                <span class="hrs selfcare-hrs">2hrs</span>
                <span class="previous previous-SelfCare">Last Week - 2hrs</span>
            </div>
        </div>

    </div>
</body>
</html>
